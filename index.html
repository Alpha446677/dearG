<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Gargee ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    margin:0;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(to bottom,#020111,#191970,#0f2027);
    position:relative;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:90%;
    max-width:760px;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);
    text-align:center;
    color:white;
    box-shadow:0 15px 35px rgba(0,0,0,.3);
}

h1{
    font-size:42px;
    margin-bottom:20px;
}

#typing{
    font-size:22px;
    line-height:1.8;
    min-height:220px;
    white-space:pre-wrap;
}

.cursor{
    display:inline-block;
    width:3px;
    background:white;
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    background:white;
    color:#ff4d6d;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#reply{
    display:none;
    margin-top:25px;
    font-size:24px;
    animation:fade 1s;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px);}
    to{opacity:1;transform:translateY(0);}
}

.heart{
    position:absolute;
    color:white;
    animation:float linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
    .stars{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:.2;
        transform:scale(.7);
    }
    to{
        opacity:1;
        transform:scale(1.5);
    }
}

.card{
    position:relative;
    z-index:2;
    opacity:0;
    transform:translateY(100px);
}
    /* Falling Sunflowers */

.sunflower{
    position:fixed;
    top:-120px;
    width:50px;
    height:50px;
    background-image:url("sunflower.png");
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    pointer-events:none;
    z-index:1;
    animation:fall linear forwards;
}

@keyframes fall{

    0%{
        transform:
            translateY(-120px)
            translateX(0px)
            rotate(0deg);
        opacity:1;
    }

    25%{
        transform:
            translateY(25vh)
            translateX(-25px)
            rotate(90deg);
    }

    50%{
        transform:
            translateY(50vh)
            translateX(25px)
            rotate(180deg);
    }

    75%{
        transform:
            translateY(75vh)
            translateX(-20px)
            rotate(270deg);
    }

    100%{
        transform:
            translateY(110vh)
            translateX(20px)
            rotate(360deg);
        opacity:0;
    }

}
 /* ===========================
   Envelope Animation
=========================== */

#envelopeContainer{
    position:absolute;
    z-index:50;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#envelope{
    width:240px;
    height:150px;
    background:#f5d7b5;
    border-radius:12px;
    position:relative;
    cursor:pointer;
    box-shadow:0 0 30px rgba(255,255,255,.4);
    transition:.8s;
}

#envelope:hover{
    transform:scale(1.05);
}

.flap{
    position:absolute;
    width:100%;
    height:100%;
    background:#efcfa8;
    clip-path:polygon(0 0,50% 60%,100% 0);
    transform-origin:top;
    transition:1s;
}

#envelope.open .flap{
    transform:rotateX(180deg);
}

.letterIcon{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
}

.tapText{
    margin-top:25px;
    color:white;
    font-size:22px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{

    50%{
        opacity:.4;
    }

}
    /* Envelope flies away */

#envelope.flyAway{

    animation:flyAway 1s forwards;

}

@keyframes flyAway{

    0%{
        opacity:1;
        transform:translateY(0) scale(1);
    }

    100%{
        opacity:0;
        transform:translateY(-220px) scale(.5) rotate(-15deg);
    }

}

/* Letter animation */

.showLetter{

    animation:letterAppear 1.2s ease forwards;

}

@keyframes letterAppear{

    from{

        opacity:0;

        transform:
            translateY(120px)
            scale(.85);

    }

    to{

        opacity:1;

        transform:
            translateY(0)
            scale(1);

    }

}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div id="envelopeContainer">

    <div id="envelope" onclick="openLetter()">

        <div class="flap"></div>

        <div class="letterIcon">💌</div>

    </div>

    <p class="tapText">Click the envelope ❤️</p>

</div>

<div class="card" id="letterCard" style="display:none;">

<h1>Dear Gargee ❤️</h1>

<div id="typing"></div>

<button onclick="forgive()">
❤️ Read My Heart
</button>

<div id="reply">
Thank you for reading. 🌹<br><br>
No matter what happens, I'll always wish the best for you i.e KARAN.<br>
❤️ I love you, Gargee.
</div>

</div>

<!-- Background Music -->
<audio id="bgMusic" loop>
    <source src="enna_sona.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
</audio>

<script>

const message = `I miss you so much that I cannot desrcibe since I am not expressive but I guess I can definitely code and express myself since I am a software engineer.
Yesterday when we talked I felt a bit lighter and I really liked the convo. I miss you in such a way that only stars can do when sun comes up. They wait for the day to pass
and when the moon comes up they shine bright as much as they can. You are my moon and without you I am missing my shine. Come home soon darling. Don't let this star become a shooting star and
even if I fall while waiting for you I,ll make sure I fulfill your every wish just like a shooting star does.

your and only yours
Bunny<3`;

let i = 0;

function typeWriter(){

    if(i < message.length){

        document.getElementById("typing").innerHTML =
            message.substring(0, i + 1) +
            "<span class='cursor'></span>";

        i++;

        setTimeout(typeWriter, 45);

    } else {

        document.getElementById("typing").innerHTML = message;

    }

}


function forgive(){

    // Play background music after user interaction
    const music = document.getElementById("bgMusic");

    music.play().catch(function(error){
        console.log("Playback prevented by browser:", error);
    });

    document.getElementById("reply").style.display = "block";

    for(let i = 0; i < 70; i++){

        let h = document.createElement("div");

        h.className = "heart";
        h.innerHTML = "❤️";

        h.style.left = Math.random() * 100 + "vw";
        h.style.fontSize = (15 + Math.random() * 20) + "px";
        h.style.animationDuration = (4 + Math.random() * 5) + "s";

        document.body.appendChild(h);

        setTimeout(() => h.remove(), 9000);

    }

}
const stars = document.getElementById("stars");

for (let i = 0; i < 250; i++) {

    let star = document.createElement("div");

    star.className = "star";

    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";
    star.style.animationDuration = (1 + Math.random() * 3) + "s";
    star.style.opacity = Math.random();

    stars.appendChild(star);
}
function createSunflower(){

    const flower = document.createElement("div");

    flower.className = "sunflower";

    flower.style.left = Math.random()*100 + "vw";

    const size = 30 + Math.random()*45;

    flower.style.width = size + "px";
    flower.style.height = size + "px";

    flower.style.animationDuration =
        (8 + Math.random()*5) + "s";

    document.body.appendChild(flower);

    setTimeout(()=>{
        flower.remove();
    },13000);

}

setInterval(createSunflower,500);
  function openLetter(){

    const envelope = document.getElementById("envelope");

    envelope.classList.add("open");

    setTimeout(function(){

        envelope.classList.add("flyAway");

    },900);

    setTimeout(function(){

        document.getElementById("envelopeContainer").style.display="none";

        const card=document.getElementById("letterCard");

        card.style.display="block";

        card.classList.add("showLetter");

        typeWriter();

        const music=document.getElementById("bgMusic");

        music.play().catch(()=>{});

    },1700);

}
</script>

</body>
</html>
